<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Coșul meu - MegaShop</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="top-bar">
    <div class="logo">Mega<span>Shop</span></div>
    <div class="user-actions">
        <a href="index.html">Acasă</a>
        <a href="favorite.html">Favorite</a>
        <a href="checkout.html">Finalizează</a>
    </div>
</header>

<section class="cart-page">
    <h2>Coșul meu</h2>
    <div id="cartItems"></div>
    <h3 id="totalPrice"></h3>
    <a class="checkout-button" href="checkout.html">Plasează comanda</a>
</section>

<script>
const API = "/api";
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser || !currentUser.id) {
    alert("Trebuie să fii logat!");
    window.location.href = "login.html";
}

let cartItems = document.getElementById("cartItems");
let totalPrice = document.getElementById("totalPrice");

async function renderCart() {
    const res = await fetch(`${API}/cart/${currentUser.id}`);
    const cart = await res.json();

    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        cartItems.innerHTML = "<p>Coșul este gol.</p>";
        totalPrice.innerText = "Total: 0 lei";
        return;
    }

    cart.forEach(product => {
        total += product.price * product.quantity;

        cartItems.innerHTML += `
            <div class="cart-item">
                <a href="produs.html?id=${product.id}">
                    <img src="${product.image}">
                </a>

                <div>
                    <h3>
                        <a href="produs.html?id=${product.id}">${product.name}</a>
                    </h3>
                    <p>${product.description}</p>
                    <p>Cantitate: <strong>${product.quantity}</strong></p>
                    <strong>${product.price} lei</strong>
                </div>

                <button onclick="removeFromCart(${product.cartId})">Șterge</button>
            </div>
        `;
    });

    totalPrice.innerText = "Total: " + total + " lei";
}

async function removeFromCart(cartId) {
    await fetch(`${API}/cart/${cartId}`, {
        method: "DELETE"
    });

    renderCart();
}

renderCart();
</script>

</body>
</html>
