<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Resetare parolă</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="auth-container">
    <div class="auth-box">
        <h2>Setează parola nouă</h2>

        <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Parolă nouă" oninput="checkResetPassword()">
            <span onclick="toggleResetPassword('newPassword')" class="eye-btn">👁️</span>
        </div>

        <div id="passwordRules" class="password-rules">
            <p id="ruleLength">❌ Minim 8 caractere</p>
            <p id="ruleUpper">❌ O literă mare</p>
            <p id="ruleNumber">❌ Un număr</p>
            <p id="ruleSymbol">❌ Un simbol (!@#$)</p>
        </div>

        <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirmă parola">
            <span onclick="toggleResetPassword('confirmPassword')" class="eye-btn">👁️</span>
        </div>

        <button onclick="resetPassword()">Resetează parola</button>
    </div>
</section>

<script>
const API = "http://localhost:3000/api";

function checkResetPassword() {
    let pass = document.getElementById("newPassword").value;

    updateRule("ruleLength", pass.length >= 8);
    updateRule("ruleUpper", /[A-Z]/.test(pass));
    updateRule("ruleNumber", /[0-9]/.test(pass));
    updateRule("ruleSymbol", /[^A-Za-z0-9]/.test(pass));
}

function updateRule(id, valid) {
    const el = document.getElementById(id);
    const text = el.innerText.substring(2);

    if (valid) {
        el.innerText = "✅ " + text;
        el.style.color = "green";
    } else {
        el.innerText = "❌ " + text;
        el.style.color = "red";
    }
}

function toggleResetPassword(inputId) {
    const input = document.getElementById(inputId);
    input.type = input.type === "password" ? "text" : "password";
}

async function resetPassword() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if (
        password.length < 8 ||
        !/[A-Z]/.test(password) ||
        !/[0-9]/.test(password) ||
        !/[^A-Za-z0-9]/.test(password)
    ) {
        checkResetPassword();
        alert("Parola nu respectă toate condițiile.");
        return;
    }

    if (password !== confirm) {
        alert("Parolele nu coincid!");
        return;
    }

    const res = await fetch(`${API}/reset-password`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ token, password })
    });

    const data = await res.json();
    alert(data.message);

    if (res.ok) {
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
